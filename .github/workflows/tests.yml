name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    name: Jest unit tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      # Tests do not hit the database directly (all fail at validation/auth).
      # A placeholder URL satisfies dotenv and the neon() lazy client.
      DATABASE_URL: postgresql://test:test@localhost:5432/test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        id: tests
        run: yarn test
        continue-on-error: true

      - name: Annotate test failure
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error title=Tests failed::One or more Jest tests failed. Check the test output above for details."

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Generate step summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.tests.outcome }}" == "success" ]; then
            echo "### ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Tests failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the workflow logs for details or download the coverage artifact." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY

          if [ -f coverage/coverage-summary.json ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (k) => \`\${k.pct}% (\${k.covered}/\${k.total})\`;
              console.log('Statements : ' + fmt(s.statements));
              console.log('Branches   : ' + fmt(s.branches));
              console.log('Functions  : ' + fmt(s.functions));
              console.log('Lines      : ' + fmt(s.lines));
            " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "_Coverage summary not available (tests may have failed before collection)._" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
